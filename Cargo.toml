[package]
name = "ato-mcp"
version = "0.14.1"
edition = "2021"
license = "MIT"
description = "Standalone MCP server for the Australian Taxation Office legal corpus"

[[bin]]
name = "ato-mcp"
path = "src/main.rs"

[dependencies]
anyhow = "1.0"
base64 = "0.22"
chrono = { version = "0.4", default-features = false, features = ["clock", "std"] }
clap = { version = "4.5", features = ["derive"] }
dirs = "6.0"
fs2 = "0.4"
flate2 = { version = "1.1", default-features = false, features = ["rust_backend"] }
regex = "1.11"
rusqlite = { version = "0.31", features = ["bundled", "functions"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
simsimd = "5"
tar = "0.4"
tiny_http = "0.12"
scraper = "0.20"
ego_tree = { package = "ego-tree", version = "0.6" }
tempfile = "3.15"
tokenizers = { version = "0.23", default-features = false, features = ["fancy-regex"] }
url = "2.5"
zip = { version = "4.6", default-features = false, features = ["deflate-flate2"] }
zstd = "0.13"
# native-tls (system OpenSSL / Security.framework / SChannel) rather than
# rustls: rustls hard-errors when an HTTPS peer closes a connection without
# the TLS close_notify alert ("peer closed connection without sending TLS
# close_notify"), which the ATO site + corporate proxies do routinely.
# native-tls treats that abrupt close as a normal EOF. Used by every
# outbound fetch path (`fetch` live-fetcher, tree-crawl, link-download,
# whats-new, update); the MCP transport itself is plain localhost HTTP.
reqwest = { version = "0.12", default-features = false, features = ["blocking", "native-tls"] }
# AustLII integration: rookie reads cf_clearance from the user's actual
# browser cookie store (Chrome/Edge/Firefox/Safari) so requests look
# legitimate; open launches the user's default browser during the
# `austlii setup` consent flow to acquire the cookie. AustLII fetches go
# through the same reqwest+native-tls path as ATO — system OpenSSL on
# Linux/macOS and SChannel on Windows give a fingerprint indistinguishable
# from curl (which the issue russellbrenner/auslaw-mcp#101 verified
# bypasses AustLII's Cloudflare gate on classic.austlii.edu.au), without
# the symbol-collision a BoringSSL-based wreq would create against
# native-tls's openssl-sys.
rookie = "0.5"
open = "5"
# Pure-Rust PDF text extraction. AustLII serves some judgments as PDFs;
# scanned ones (no text layer) fall through to the OCR path in src/ocr.rs.
pdf-extract = "0.7"

[features]
default = []
cuda = ["ort/cuda"]

[target.'cfg(windows)'.dependencies]
ort = { version = "2.0.0-rc.12", default-features = false, features = ["load-dynamic", "api-24", "ndarray"] }
# Windows default-browser detection reads
# HKCU\Software\Microsoft\Windows\Shell\Associations\UrlAssociations\http\UserChoice
# to find the registered ProgID, then resolves the exe path via the
# corresponding `<ProgID>\shell\open\command` key.
winreg = "0.55"

[target.'cfg(not(windows))'.dependencies]
ort = "2.0.0-rc.12"

[dev-dependencies]
rand = "0.8"

name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  compile:
    name: compile and test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
      - name: Check every target and feature
        run: cargo check --all-targets --all-features --locked
      - name: Test
        run: cargo test --locked

  quality:
    name: lint, security, and contracts
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          components: clippy, rustfmt
      - name: Rust formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings
      - name: Install security policy tools
        run: |
          cargo install cargo-audit --version 0.22.2 --locked
          cargo install cargo-deny --version 0.20.2 --locked
      - name: Dependency advisories and policy
        run: |
          cargo audit
          cargo deny check advisories
      - name: Shell syntax
        run: bash -n scripts/*.sh
      - name: Metadata and npm allowlist contracts
        run: |
          npm pack --dry-run --json > "$RUNNER_TEMP/npm-pack.json"
          python3 - <<'PY'
          import json, os, pathlib, tomllib
          cargo = tomllib.loads(pathlib.Path("Cargo.toml").read_text())
          package = json.loads(pathlib.Path("package.json").read_text())
          plugin_path = pathlib.Path(".claude-plugin/plugin.json")
          plugin = json.loads(plugin_path.read_text())
          market_path = pathlib.Path(".claude-plugin/marketplace.json")
          marketplace = json.loads(market_path.read_text())
          mcp = json.loads(pathlib.Path(".mcp.json").read_text())
          assert cargo["package"]["name"] == "australian-legal-mcp"
          assert {target["name"] for target in cargo.get("bin", [])} == {"legal-mcp"}
          assert package["name"] == "australian-legal-mcp"
          assert plugin["name"] == "australian-legal-mcp"
          assert marketplace["name"] == "australian-legal-mcp"
          assert marketplace["plugins"][0]["name"] == "australian-legal-mcp"
          assert mcp["mcpServers"] == {
              "australian-legal": {"command": "legal-mcp", "args": ["mcp"]}
          }
          versions = {
              cargo["package"]["version"],
              package["version"],
              plugin["version"],
              marketplace["plugins"][0]["version"],
          }
          assert len(versions) == 1, f"manifest versions differ: {versions}"
          expected_skills = [
              "skills/australian-legal-mcp/SKILL.md",
              "skills/setup-australian-legal-mcp/SKILL.md",
          ]
          assert package["pi"]["skills"] == expected_skills
          report = pathlib.Path(os.environ["RUNNER_TEMP"], "npm-pack.json")
          packed = json.loads(report.read_text())[0]["files"]
          names = {entry["path"] for entry in packed}
          allowed = (
              "package.json", "README.md", "LICENSE", "AGENTS.md", ".mcp.json",
              "CURRENT_STATE.md", "DEPLOYMENT.md", "MAINTENANCE.md", "PLAN.md",
          )
          roots = (".claude-plugin/", "skills/")
          unexpected = {
              name for name in names
              if name not in allowed and not name.startswith(roots)
          }
          assert not unexpected, unexpected
          for skill in expected_skills:
              assert skill in names
          PY
      - name: Build package and exercise stdio
        timeout-minutes: 5
        shell: bash
        run: |
          cargo build --release --locked
          version=$(jq -r .version package.json)
          target=$(rustc -vV | sed -n 's/^host: //p')
          executable=legal-mcp
          binary=target/release/legal-mcp
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            executable=legal-mcp.exe
            binary=target/release/legal-mcp.exe
          fi
          mkdir -p "$RUNNER_TEMP/package"
          cp "$binary" "$RUNNER_TEMP/package/$executable"
          chmod 755 "$RUNNER_TEMP/package/$executable"
          cp README.md LICENSE "$RUNNER_TEMP/package/"
          archive="$RUNNER_TEMP/legal-mcp-$version-$target.tar.gz"
          tar -C "$RUNNER_TEMP/package" -czf "$archive" .
          mkdir "$RUNNER_TEMP/unpacked"
          tar -C "$RUNNER_TEMP/unpacked" -xzf "$archive"
          "$RUNNER_TEMP/unpacked/$executable" --version
          export LEGAL_MCP_DATA_DIR="$RUNNER_TEMP/data"
          request=$(jq -nc '{
            jsonrpc:"2.0", id:1, method:"initialize",
            params:{
              protocolVersion:"2025-06-18", capabilities:{},
              clientInfo:{name:"ci", version:"1"}
            }
          }')
          printf '%s\n' "$request" | \
            "$RUNNER_TEMP/unpacked/$executable" mcp \
            > "$RUNNER_TEMP/stdio.jsonl"
          jq -e '.result.serverInfo.name == "australian-legal-mcp"' \
            "$RUNNER_TEMP/stdio.jsonl"

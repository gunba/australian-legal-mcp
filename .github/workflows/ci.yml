name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust:
    name: rust binary
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install tesseract for OCR tests
        # tesseract-ocr is needed for the scanned-PDF fallback path that
        # the AustLII fetcher uses when allow_ocr is set. The rest of
        # the deps (native-tls / openssl) ride on the runner image's
        # default libssl-dev.
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr
      - name: Build
        run: cargo build --release --locked
      - name: Clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings
      - name: Test
        run: cargo test --locked


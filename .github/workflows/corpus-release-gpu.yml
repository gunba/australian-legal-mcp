name: corpus release (gpu)

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: corpus-release-gpu
  cancel-in-progress: false

jobs:
  build-and-release:
    name: gpu scrape, embed, release
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 720
    env:
      GH_TOKEN: ${{ github.token }}
      ATO_MCP_REPO_DIR: ${{ github.workspace }}
      ATO_MCP_PAGES_DIR: ${{ github.workspace }}/../ato_pages
      ATO_MCP_MODEL_DIR: >-
        ${{ vars.ATO_MCP_MODEL_DIR ||
        '/opt/ato-mcp/models/granite-embedding-small-r2' }}
      ATO_MCP_GH_REPO: ${{ github.repository }}
      ATO_MCP_MODE: incremental
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
      - name: Require NVIDIA GPU
        run: |
          command -v nvidia-smi
          nvidia-smi
      - name: Build Rust binary
        run: cargo build --release --locked --features cuda
      - name: Scrape, embed, publish
        run: scripts/maintainer-sync.sh

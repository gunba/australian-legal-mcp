name: corpus release (gpu)

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: corpus-release-gpu
  cancel-in-progress: false

jobs:
  build-and-release:
    name: gpu scrape, embed, release
    runs-on: [self-hosted, linux, x64, gpu]
    timeout-minutes: 720
    env:
      ATO_MCP_REPO_DIR: ${{ github.workspace }}
      ATO_MCP_PAGES_DIR: ${{ github.workspace }}/../ato_pages
      ATO_MCP_MODEL_DIR: ${{ github.workspace }}/models/granite-embedding-small-r2
      ATO_MCP_GH_REPO: ${{ github.repository }}
      ATO_MCP_MODE: incremental
      ATO_MCP_RELEASE_TAG: index
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Require NVIDIA GPU
        run: |
          command -v nvidia-smi
          nvidia-smi
      - name: Build Rust binary
        run: cargo build --release --locked --features cuda
      - name: Scrape, embed, publish
        run: scripts/maintainer-sync.sh
